<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ballpark Bingo - Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Domine:wght@400;600;700&amp;family=Work+Sans:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary": "#ffffff",
                    "primary-fixed": "#bfeec5",
                    "error": "#ba1a1a",
                    "primary": "#033016",
                    "secondary": "#a43c2b",
                    "on-secondary-fixed": "#3f0200",
                    "surface-bright": "#fcf9f8",
                    "surface-container-high": "#eae7e7",
                    "on-tertiary-fixed-variant": "#484740",
                    "on-primary-fixed": "#00210c",
                    "secondary-fixed-dim": "#ffb4a6",
                    "surface-variant": "#e4e2e1",
                    "on-background": "#1b1c1c",
                    "on-secondary-container": "#71170a",
                    "surface-tint": "#3d6748",
                    "tertiary-container": "#403f38",
                    "on-primary-fixed-variant": "#254f31",
                    "tertiary-fixed-dim": "#c9c6bd",
                    "error-container": "#ffdad6",
                    "surface-container-highest": "#e4e2e1",
                    "secondary-fixed": "#ffdad4",
                    "on-error": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-container": "#88b590",
                    "surface-container": "#f0eded",
                    "on-secondary": "#ffffff",
                    "on-secondary-fixed-variant": "#842416",
                    "inverse-on-surface": "#f3f0f0",
                    "primary-container": "#1d472a",
                    "tertiary": "#292923",
                    "on-surface-variant": "#414941",
                    "outline": "#727971",
                    "on-tertiary-container": "#acaaa1",
                    "on-surface": "#1b1c1c",
                    "on-tertiary-fixed": "#1c1c16",
                    "inverse-primary": "#a3d2ab",
                    "outline-variant": "#c1c9bf",
                    "surface-container-low": "#f6f3f2",
                    "tertiary-fixed": "#e5e2d9",
                    "on-tertiary": "#ffffff",
                    "on-error-container": "#93000a",
                    "surface-dim": "#dcd9d9",
                    "inverse-surface": "#303030",
                    "primary-fixed-dim": "#a3d2ab",
                    "secondary-container": "#fd7e67",
                    "surface": "#fcf9f8",
                    "background": "#fcf9f8"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "gutter": "24px",
                    "container-max": "1280px",
                    "xs": "4px",
                    "sm": "12px",
                    "xl": "80px",
                    "base": "8px",
                    "lg": "48px",
                    "md": "24px"
            },
            "fontFamily": {
                    "body-md": ["Work Sans"],
                    "headline-lg": ["Domine"],
                    "headline-lg-mobile": ["Domine"],
                    "stats-number": ["Domine"],
                    "body-lg": ["Work Sans"],
                    "headline-md": ["Domine"],
                    "label-md": ["Work Sans"],
                    "display-lg": ["Domine"]
            },
            "fontSize": {
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                    "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                    "stats-number": ["36px", {"lineHeight": "44px", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .pinstripe-bg {
            background-image: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 39px,
                rgba(3, 48, 22, 0.05) 40px
            );
        }
        .stadium-glow {
            box-shadow: 0 0 60px 0 rgba(3, 48, 22, 0.12);
        }
        .etched-border {
            border: 1px solid rgba(114, 121, 113, 0.2);
        }
        .glass-card {
            background-color: rgba(252, 249, 248, 0.88);
            backdrop-filter: blur(12px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body-md text-on-surface pinstripe-bg min-h-screen flex flex-col items-center justify-center relative overflow-x-hidden">
<!-- Subtle Stadium Grass Texture Overlay -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03]" style="background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');">
</div>
<!-- Main Content Container -->
<main class="relative z-10 w-full max-w-[440px] px-gutter py-lg animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Header / Logo Area -->
<div class="text-center mb-md">
<div class="inline-flex items-center justify-center w-20 h-20 bg-primary rounded-full mb-sm stadium-glow transform -rotate-6 border-4 border-surface shadow-lg">
<span class="material-symbols-outlined text-on-primary text-[40px]" data-icon="sports_baseball" style="font-variation-settings: 'FILL' 1;">sports_baseball</span>
</div>
<h1 class="font-display-lg text-display-lg text-primary tracking-tight mb-xs">
                BALLPARK BINGO
            </h1>
<p class="font-body-md text-on-surface-variant italic">
                The National Pastime's Favorite Side Game
            </p>
</div>
<!-- Glass Login Panel -->
<div class="glass-card etched-border rounded-xl p-md md:p-lg stadium-glow relative overflow-hidden">
<!-- Decorative Corner Detail -->
<div class="absolute -top-6 -right-6 w-12 h-12 bg-secondary opacity-10 rotate-45"></div>
<form class="space-y-md" onsubmit="event.preventDefault();">
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-primary uppercase tracking-widest" for="ballpark-id">
                        Ballpark ID (Email)
                    </label>
<div class="relative">
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 px-0 py-base font-body-lg text-body-lg placeholder:text-outline/50 transition-colors" id="ballpark-id" name="email" placeholder="scout@grandslam.com" type="email"/>
<span class="material-symbols-outlined absolute right-0 bottom-base text-outline/40" data-icon="badge">badge</span>
</div>
</div>
<div class="space-y-sm">
<div class="flex justify-between items-center">
<label class="block font-label-md text-label-md text-primary uppercase tracking-widest" for="password">
                            Password
                        </label>
<a class="text-[12px] font-label-md text-secondary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 px-0 py-base font-body-lg text-body-lg placeholder:text-outline/50 transition-colors" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-0 bottom-base text-outline/40 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<button class="w-full bg-primary text-on-primary font-headline-md text-headline-md py-base px-md rounded-lg shadow-md hover:bg-primary-container active:scale-[0.98] transition-all duration-200 mt-sm flex items-center justify-center gap-sm" type="submit">
                    Step Up to the Plate
                    <span class="material-symbols-outlined" data-icon="sports_baseball">sports_baseball</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center my-md">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="px-sm font-label-md text-label-md text-outline/60 italic">League Entry</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-sm">
<button class="flex items-center justify-center gap-xs etched-border py-sm rounded-lg hover:bg-secondary/5 active:scale-95 transition-all group">
<div class="w-6 h-6 flex items-center justify-center rounded-full bg-secondary text-on-secondary text-[14px]">G</div>
<span class="font-label-md text-label-md group-hover:text-secondary">Google</span>
</button>
<button class="flex items-center justify-center gap-xs etched-border py-sm rounded-lg hover:bg-secondary/5 active:scale-95 transition-all group">
<div class="w-6 h-6 flex items-center justify-center rounded-full bg-secondary text-on-secondary text-[14px]">
<span class="material-symbols-outlined !text-[16px]" data-icon="apple" style="font-variation-settings: 'FILL' 1;">apps</span>
</div>
<span class="font-label-md text-label-md group-hover:text-secondary">Apple ID</span>
</button>
</div>
</div>
<!-- Footer Actions -->
<div class="text-center mt-md space-y-sm">
<p class="font-body-md text-on-surface-variant">
                First time at the yard? 
                <a class="text-secondary font-bold hover:underline" href="#">Join the Roster</a>
</p>
<div class="flex justify-center gap-md">
<a class="font-label-md text-[12px] text-outline hover:text-primary transition-colors" href="#">Privacy Policy</a>
<span class="text-outline/20">•</span>
<a class="font-label-md text-[12px] text-outline hover:text-primary transition-colors" href="#">Ground Rules</a>
</div>
</div>
</main>
<!-- Visual Atmosphere: Stadium Light Glows -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/5 blur-[120px] rounded-full pointer-events-none"></div>
<script>
        // Micro-interaction for the baseball icon rotation on hover
        const loginBtn = document.querySelector('button[type="submit"]');
        const baseballIcon = loginBtn.querySelector('.material-symbols-outlined');
        
        loginBtn.addEventListener('mouseenter', () => {
            baseballIcon.style.transition = 'transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
            baseballIcon.style.transform = 'rotate(180deg)';
        });
        
        loginBtn.addEventListener('mouseleave', () => {
            baseballIcon.style.transform = 'rotate(0deg)';
        });

        // Atmospheric parallax for the background pinstripes
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 10;
            const y = (e.clientY / window.innerHeight - 0.5) * 10;
            document.body.style.backgroundPosition = `${x}px ${y}px`;
        });
    </script>
</body></html>
